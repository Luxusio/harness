# This file is the sole source of truth for approval gates.
# The orchestrator checks this before any risky edit.
# manifest.yaml risk_zones are descriptive context, not approval gates.
version: 1

always_ask_before:
  - kind: auth_change
    paths:
      - "src/auth/**"
      - "auth/**"
    reason: "Authentication and authorization logic"

  - kind: db_schema_change
    paths:
      - "db/**"
      - "migrations/**"
      - "schema/**"
    reason: "Database schema and migration risk"

  - kind: large_delete_or_move
    actions:
      - delete
      - move
    min_files: 10
    reason: "Large structural deletes or moves have broad blast radius"

auto_ok_examples:
  - docs_only_change
  - targeted_test_addition
  - small_internal_refactor_with_no_behavior_change

ask_when:
  requirements_ambiguous: true
  blast_radius_unknown: true
  existing_rule_conflicts: true
