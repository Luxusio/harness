# harness manifest — generated by /harness:setup
#
# Inferred values use inline comments: value  # inferred:<confidence>
# Confidence tiers: high (from config field), medium (from pattern), low (asked user)
# Values without a marker are confirmed (explicitly set or user-verified).

version: 1

project:
  name: "{{PROJECT_NAME}}"
  mode: "{{PROJECT_MODE}}"        # greenfield | brownfield
  type: "{{PROJECT_TYPE}}"        # web-app | api-service | worker | library | monorepo | other
  languages:
    - "{{LANGUAGE_1}}"
  frameworks:
    - "{{FRAMEWORK_1}}"
  package_manager: "{{PACKAGE_MANAGER}}"

commands:
  dev: "{{DEV_COMMAND}}"
  build: "{{BUILD_COMMAND}}"
  test: "{{TEST_COMMAND}}"
  lint: "{{LINT_COMMAND}}"

key_journeys:
  - "{{KEY_JOURNEY_1}}"
  - "{{KEY_JOURNEY_2}}"

risk_zones:
  - path: "{{RISK_PATH_1}}"
    reason: "{{RISK_REASON_1}}"
  - path: "{{RISK_PATH_2}}"
    reason: "{{RISK_REASON_2}}"

approval_defaults:
  always_ask_for:
    - db_schema
    - api_contract
    - auth
    - infra
    - dependency_upgrade
    - large_delete_or_move

memory:
  system_of_record:
    - "harness/docs/constraints/"
    - "harness/docs/decisions/"
    - "harness/docs/domains/"
    - "harness/docs/runbooks/"
    - "harness/state/"
  source_priority:
    - user_confirmed_rule
    - repo_explicit_rule
    - code_and_test_evidence
    - runtime_evidence
    - hypothesis
