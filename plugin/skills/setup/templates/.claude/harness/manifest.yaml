version: 4
initialized_at: {{SETUP_DATE}}
entrypoint: CLAUDE.md

project:
  shape: {{PROJECT_SHAPE}}
  primary_frontend:
    cwd: {{FRONTEND_CWD}}
    framework: {{FRAMEWORK}}

runtime:
  dev_command: "{{DEV_COMMAND}}"
  test_command: "{{TEST_COMMAND}}"
  smoke_command: "scripts/harness/smoke.sh"
  healthcheck_command: "scripts/harness/healthcheck.sh"
  reset_command: "scripts/harness/reset-db.sh"
  base_urls:
    frontend: "{{FRONTEND_URL}}"
    api: "{{API_URL}}"

qa:
  default_mode: {{QA_MODE}}
  browser_required: {{BROWSER_REQUIRED}}

browser:
  enabled: {{BROWSER_ENABLED}}
  mcp_server: chrome-devtools
  launch_config: .claude/launch.json
  status: {{BROWSER_STATUS}}
