# harness manifest — generated by /harness:setup
# Fields are organized by access pattern:
#   Top-level flat fields  → read by manifest_field("key")
#   Nested sections        → read by manifest_section_field("section", "key")
#   browser/qa sections    → read by is_browser_first_project()

version: 5
initialized_at: {{SETUP_DATE}}

# --- Top-level identity (manifest_field) ---
name: {{PROJECT_NAME}}
type: {{PROJECT_TYPE}}
languages: {{PROJECT_LANGUAGES}}

# --- Top-level runtime commands (manifest_field) ---
# Omit any field whose value is unknown — scripts handle missing gracefully.
dev_command: "{{DEV_COMMAND}}"
test_command: "{{TEST_COMMAND}}"
build_command: "{{BUILD_COMMAND}}"
smoke_command: "{{SMOKE_COMMAND}}"
healthcheck_command: "{{HEALTHCHECK_COMMAND}}"

# --- Top-level verify commands (used by verify.py) ---
verify_commands:
  - "{{VERIFY_CMD_1}}"

# --- QA section (is_browser_first_project reads qa.browser_qa_supported) ---
qa:
  default_mode: {{QA_MODE}}
  browser_qa_supported: {{BROWSER_QA_SUPPORTED}}

# --- Browser section (is_browser_first_project reads browser.enabled) ---
browser:
  enabled: {{BROWSER_ENABLED}}
  mcp_server: chrome-devtools
  launch_config: .claude/launch.json
  entry_url: "{{APP_URL}}"
  status: {{BROWSER_STATUS}}

# --- Capabilities (capability_probe reads capabilities.delegation_mode) ---
capabilities:
  delegation_mode: auto
  strict_compliance_requires_delegation: true

# --- Project metadata (informational — not parsed by scripts) ---
project_meta:
  shape: {{PROJECT_SHAPE}}
  package_managers: {{PROJECT_PACKAGE_MANAGERS}}
  primary_frontend:
    cwd: {{FRONTEND_CWD}}
    framework: {{FRAMEWORK}}
  ports: {{RUNTIME_PORTS}}

# --- Registered doc roots for memory retrieval ---
registered_roots:
  - common

# --- Tooling readiness (manifest_section_field) ---
tooling:
  ast_grep_ready: {{AST_GREP_READY}}
  lsp_ready: {{LSP_READY}}
  cclsp_ready: {{CCLSP_READY}}
  observability_ready: {{OBSERVABILITY_READY}}
  chrome_devtools_ready: {{CHROME_DEVTOOLS_READY}}

# --- Profiles (manifest_section_field) ---
profiles:
  symbol_lane_enabled: {{SYMBOL_LANE_ENABLED}}
  ast_grep_enabled: {{AST_GREP_ENABLED}}
  observability_enabled: {{OBSERVABILITY_ENABLED}}

# --- Team orchestration (manifest_section_field) ---
teams:
  provider: auto
  native_ready: false
  omc_ready: false
  auto_activate: true
  approval_mode: preapproved
  teammate_mode: auto
  default_size: 3
  max_size: 5
  fallback: subagents
  safe_only:
    require_disjoint_files: true
    forbid_same_file_edits: true
    forbid_heavy_dependency_chains: true

# --- Architecture constraints (optional) ---
# Populated by setup when project has clear boundaries.
# Entries are HINTS only — inform critic playbooks but do not hard-block.
# constraints:
#   - rule: "src/server must not import from src/client"
#     check: "grep -r 'from.*src/client' src/server && exit 1 || exit 0"
