# harness manifest — generated by /harness:setup
#
# Inferred values use inline comments: value  # inferred:<confidence>
# Confidence tiers used during setup:
# - high: direct config evidence
# - medium: pattern-based inference
# - low: ask the user instead of writing a value
# Values without a marker are confirmed (explicitly set or user-verified).

version: 1

project:
  name: "harness"
  mode: "greenfield"
  type: "library"  # inferred:high — Claude Code plugin
  languages:
    - "markdown"  # inferred:high
    - "yaml"  # inferred:high
    - "shell"  # inferred:high
  frameworks:
    - "claude-code-plugin"  # inferred:high
  package_manager: "none"

# Runtime validation source of truth.
# Empty string means "no known command"; scripts may use fallback detection only when a command is empty.
commands:
  dev: "claude --plugin-dir ./plugin"
  build: ""
  test: "claude --plugin-dir ./plugin --print 'list harness skills'"  # inferred:medium
  lint: ""

key_journeys:
  - "Plugin development: modify skills/agents/hooks → test with --plugin-dir → verify"

risk_zones:
  - path: "plugin/skills/setup/"
    reason: "Setup skill generates the entire control plane — changes affect all new repos"
  - path: "plugin/agents/harness-orchestrator.md"
    reason: "Main agent prompt — changes affect all runtime behavior"

memory:
  system_of_record:
    - "harness/docs/constraints/"
    - "harness/docs/decisions/"
    - "harness/docs/requirements/"
    - "harness/docs/domains/"
    - "harness/docs/runbooks/"
    - "harness/state/"
  source_priority:
    - user_confirmed_rule
    - repo_explicit_rule
    - code_and_test_evidence
    - runtime_evidence
    - hypothesis
