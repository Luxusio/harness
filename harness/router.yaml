version: 1

intents:
  - name: answer
    examples: ["why", "how", "what", "where", "explain"]
    execution_mode: direct_response
    primary_agents: []

  - name: requirements
    examples: ["document", "spec", "requirements", "plan", "clarify"]
    execution_mode: specialists
    primary_agents: ["requirements-curator", "docs-scribe"]

  - name: feature
    examples: ["build", "implement", "add", "feature", "create"]
    execution_mode: skill
    workflow_skill: feature-workflow
    primary_agents: ["implementation-engineer", "test-engineer", "docs-scribe"]

  - name: bugfix
    examples: ["fix", "broken", "regression", "bug", "error", "failing"]
    execution_mode: skill
    workflow_skill: bugfix-workflow
    primary_agents: ["implementation-engineer", "test-engineer", "docs-scribe"]

  - name: tests
    examples: ["test", "coverage", "case", "prove"]
    execution_mode: skill
    workflow_skill: test-expansion
    primary_agents: ["test-engineer"]

  - name: refactor
    examples: ["refactor", "cleanup", "simplify", "untangle"]
    execution_mode: skill
    workflow_skill: refactor-workflow
    primary_agents: ["refactor-engineer", "test-engineer", "docs-scribe"]

  - name: brownfield
    examples: ["legacy", "old code", "unknown area", "unfamiliar", "map"]
    execution_mode: skill
    workflow_skill: brownfield-adoption
    primary_agents: ["brownfield-mapper", "docs-scribe"]

  - name: docs
    examples: ["document", "update docs", "write guide", "readme"]
    execution_mode: skill
    workflow_skill: docs-sync
    primary_agents: ["docs-scribe"]

  - name: decision
    examples: ["from now on", "always", "never", "must", "policy", "constraint"]
    execution_mode: skill
    workflow_skill: decision-capture
    primary_agents: ["requirements-curator", "docs-scribe"]

  - name: validation
    examples: ["validate", "verify", "prove", "evidence"]
    execution_mode: skill
    workflow_skill: validation-loop
    primary_agents: ["test-engineer"]

  - name: architecture
    examples: ["boundary", "dependency", "layer", "module"]
    execution_mode: skill
    workflow_skill: architecture-guardrails
    primary_agents: ["refactor-engineer", "docs-scribe"]

  - name: memory
    examples: ["remember", "record", "capture", "store"]
    execution_mode: skill
    workflow_skill: repo-memory-policy
    primary_agents: ["docs-scribe"]

execution_contract:
  standard_steps:
    - classify
    - load_scoped_context
    - assess_risk
    - ask_if_needed
    - execute
    - validate
    - sync_docs_and_memory
    - summarize
