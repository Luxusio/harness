name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run full test suite
        env:
          HARNESS_SKIP_STDIN: "1"
        run: python -m pytest tests/ -x --tb=short

      - name: Run packaged golden replay smoke
        env:
          HARNESS_SKIP_STDIN: "1"
          HARNESS_SKIP_PREREAD: "1"
        run: python plugin/scripts/golden_replay.py --json > /tmp/golden-replay.json
