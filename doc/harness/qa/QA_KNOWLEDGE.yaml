# ── Known issues ──────────────────────────────────────────────────
# Flaky elements, race conditions, intermittent failures.
# QA agents check this before reporting failures.

known_issues: []
  # Example:
  # - element: "Modal close button"
  #   service: web-app
  #   symptom: "Sometimes takes 2 clicks to close"
  #   cause: "Race condition with CSS animation"
  #   workaround: "Wait 300ms after clicking close before next action"
  #   reliability: 80%  # how often the workaround works
  #   discovered: 2026-04-15
  #
  # - element: "Infinite scroll loader"
  #   service: web-app
  #   symptom: "Scroll triggers duplicate loads"
  #   cause: "IntersectionObserver fires twice on fast scroll"
  #   workaround: "Scroll incrementally by 500px using evaluate_script"
  #   reliability: 95%
  #   discovered: 2026-04-15

# ── QA patterns ───────────────────────────────────────────────────
# Cross-service testing patterns that QA agents should follow.

patterns:
  data_reset:
    command: null  # e.g., "npm run db:seed -- --env test"
    notes: "Command to reset test data to known state before QA session"

  auth_flow:
    steps: []
      # e.g., for form auth:
      # - "navigate to login_url"
      # - "fill email field"
      # - "fill password field"
      # - "click submit"
      # - "wait_for dashboard indicator element"
    notes: null

  screenshot_evidence:
    before_action: true
    after_action: true
    on_failure: true
    notes: "Take screenshots at these points for evidence"
