# harness manifest
version: 5
initialized_at: 2026-03-30

# --- Top-level identity ---
name: harness-plugin
type: library
languages: [python, markdown]

# --- Top-level runtime commands ---
dev_command: ""
test_command: "python3 -m pytest tests/ -x --tb=short"
build_command: ""
smoke_command: ""
healthcheck_command: ""

# --- Verify commands (used by verify.py) ---
verify_commands:
  - python3 plugin/scripts/verify.py
  - python3 plugin/scripts/verify.py healthcheck
  - python3 plugin/scripts/verify.py smoke

# --- QA ---
qa:
  default_mode: cli
  browser_qa_supported: false

browser:
  enabled: false
  mcp_server: chrome-devtools
  launch_config: doc/harness/launch.json
  entry_url: ""
  status: disabled

# --- Capabilities ---
capabilities:
  delegation_mode: auto
  strict_compliance_requires_delegation: true

# --- Project metadata ---
project_meta:
  shape: library
  package_managers: []
  primary_frontend:
    cwd: ""
    framework: ""
  ports: []

# --- Registered doc roots ---
registered_roots:
  - common

# --- Tooling readiness ---
tooling:
  ast_grep_ready: false
  lsp_ready: false
  cclsp_ready: false
  observability_ready: false
  chrome_devtools_ready: false

# --- Profiles ---
profiles:
  symbol_lane_enabled: false
  ast_grep_enabled: false
  observability_enabled: false

# --- Teams ---
teams:
  provider: auto
  native_ready: false
  omc_ready: false
  # setup snapshot only; runtime selection re-probes the current session
  auto_activate: true
  # auto-select team mode / scaffold artifacts only; not a bypass of native team approval
  teammate_mode: auto
  default_size: 3
  max_size: 5
  fallback: subagents
  safe_only:
    require_disjoint_files: true
    forbid_same_file_edits: true
    forbid_heavy_dependency_chains: true
